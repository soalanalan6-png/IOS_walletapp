name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Device (无签名)
        run: |
          xcodebuild build \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath Build/DD \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM= \
            2>&1

      - name: 打包未签名 IPA
        run: |
          mkdir -p Build/IPA/Payload
          cp -r Build/DD/Build/Products/Release-iphoneos/WalletApp.app Build/IPA/Payload/
          cd Build/IPA
          zip -r WalletApp.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WalletApp-IPA
          path: Build/IPA/WalletApp.ipa
          compression-level: 0
