name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      # 第一步：不签名编译，验证代码正确
      - name: Build Test (无签名)
        run: |
          xcodebuild build \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            2>&1
        continue-on-error: false

      # 第二步：Archive（需要签名证书）
      - name: Archive & Export IPA
        if: ${{ secrets.TEAM_ID != '' }}
        run: |
          xcodebuild archive \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath Build/WalletApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE }}" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            2>&1

          mkdir -p Build/IPA
          xcodebuild -exportArchive \
            -archivePath Build/WalletApp.xcarchive \
            -exportPath Build/IPA \
            -exportOptionsPlist .github/ExportOptions.plist \
            2>&1

      - name: Upload IPA
        if: ${{ secrets.TEAM_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: WalletApp-IPA
          path: Build/IPA/*.ipa
          compression-level: 0
