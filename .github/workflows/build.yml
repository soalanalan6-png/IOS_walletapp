name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 选择 Xcode 版本
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 显示 Xcode 版本
        run: xcodebuild -version

      - name: 创建 Xcode 项目
        run: |
          mkdir -p BuildTemp
          cd BuildTemp
          # 用 xcodebuild 通过 Package.swift 生成 xcodeproj
          xcodebuild -resolvePackageDependencies -project ../Package.swift -destination "generic/platform=iOS" 2>&1 || true
          # 直接用 swift package generate-xcodeproj
          cd ..
          swift package generate-xcodeproj --output . 2>/dev/null || true

      - name: 列出可用签名证书
        run: security find-identity -v -p codesigning

      - name: 安装描述文件
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo '${{ secrets.APPLE_PROFILE_BASE64 }}' | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision 2>/dev/null || true
          echo "描述文件安装完成"

      - name: 编译 Archive
        run: |
          xcodebuild archive \
            -scheme WalletApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath Build/WalletApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE }}" \
            OTHER_CODE_SIGN_FLAGS="--deep" \
            2>&1

      - name: 导出 IPA
        run: |
          mkdir -p Build/IPA
          xcodebuild -exportArchive \
            -archivePath Build/WalletApp.xcarchive \
            -exportPath Build/IPA \
            -exportOptionsPlist .github/ExportOptions.plist \
            2>&1

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: WalletApp-IPA
          path: Build/IPA/*.ipa
          compression-level: 0
