name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List available signing certs
        run: security find-identity -v -p codesigning

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision 2>/dev/null || true
          echo "Profile done"

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath Build/WalletApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE }}" \
            OTHER_CODE_SIGN_FLAGS="--deep" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            2>&1

      - name: Export IPA
        run: |
          mkdir -p Build/IPA
          xcodebuild -exportArchive \
            -archivePath Build/WalletApp.xcarchive \
            -exportPath Build/IPA \
            -exportOptionsPlist .github/ExportOptions.plist \
            2>&1

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WalletApp-IPA
          path: Build/IPA/*.ipa
          compression-level: 0
