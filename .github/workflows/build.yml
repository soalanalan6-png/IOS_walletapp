name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      # 不签名编译验证
      - name: Build Test
        run: |
          xcodebuild build \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM= \
            2>&1

      - name: Install Profile
        if: ${{ secrets.TEAM_ID != '' && secrets.TEAM_ID != '' }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision 2>/dev/null || true

      - name: Archive & Export IPA
        if: ${{ secrets.TEAM_ID != '' && secrets.CODE_SIGN_IDENTITY != '' }}
        run: |
          xcodebuild archive \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath Build/WalletApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE }}" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            2>&1

          mkdir -p Build/IPA
          xcodebuild -exportArchive \
            -archivePath Build/WalletApp.xcarchive \
            -exportPath Build/IPA \
            -exportOptionsPlist .github/ExportOptions.plist \
            2>&1

      - name: Upload IPA
        if: ${{ secrets.TEAM_ID != '' && secrets.CODE_SIGN_IDENTITY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: WalletApp-IPA
          path: Build/IPA/*.ipa
          compression-level: 0
