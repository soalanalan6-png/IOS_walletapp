name: WalletApp
options:
  bundleIdPrefix: com.walletapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Sources/WalletApp/Info.plist

targets:
  WalletApp:
    type: application
    platform: iOS
    sources:
      - Sources/WalletApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.walletapp.ios
        INFOPLIST_FILE: Sources/WalletApp/Info.plist
        DEVELOPMENT_TEAM: ""
