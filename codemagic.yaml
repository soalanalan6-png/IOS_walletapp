workflows:
  ios-build:
    name: Build WalletApp IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: 16.0
      vars:
        APP_ID: com.walletapp.ios
        APP_NAME: WalletApp
    scripts:
      - name: 安装 XcodeGen
        script: brew install xcodegen
      - name: 生成 Xcode 项目
        script: xcodegen generate
      - name: 诊断 - 查看项目结构
        script: |
          ls -la WalletApp.xcodeproj/ 2>/dev/null || echo "无 xcodeproj"
          echo "---"
          xcodebuild -list -project WalletApp.xcodeproj 2>&1 || echo "xcodebuild list 失败"
          echo "---"
          echo "检查 Sources:"
          ls Sources/WalletApp/
      - name: 无签名编译验证
        script: |
          xcodebuild build \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM= 2>&1
    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/xcarchive/*.xcarchive
    publishing:
      email:
        recipients:
          - soalan10617@gmail.com
