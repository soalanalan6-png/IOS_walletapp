workflows:
  ios-build:
    name: Build WalletApp IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: 16.0
      vars:
        APP_ID: com.walletapp.ios
        APP_NAME: WalletApp
    scripts:
      - name: 安装 XcodeGen
        script: brew install xcodegen
      - name: 生成 Xcode 项目
        script: xcodegen generate
      - name: 无签名编译验证
        script: |
          xcodebuild build \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=
      - name: Archive（需要签名）
        script: |
          xcodebuild archive \
            -project WalletApp.xcodeproj \
            -scheme WalletApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/WalletApp.xcarchive | xcpretty
      - name: 导出 IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/WalletApp.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist .github/ExportOptions.plist
    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/xcarchive/*.xcarchive
    publishing:
      email:
        recipients:
          - soalan10617@gmail.com
